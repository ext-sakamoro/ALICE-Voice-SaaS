version: "3.9"
services:
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: ../../docker/Dockerfile.gateway
    ports:
      - "8080:8080"
    depends_on:
      - core-engine
    environment:
      - RUST_LOG=info
  core-engine:
    build:
      context: ./services/core-engine
      dockerfile: ../../docker/Dockerfile.engine
    ports:
      - "8081:8081"
    environment:
      - RUST_LOG=info
